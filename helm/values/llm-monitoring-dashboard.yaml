name: llm-monitoring-dashboard

image:
  tag: latest

service:
  port: 8000

ingress:
  path: /monitor

persistence:
  enabled: true
  size: 500Mi
  mountPath: /app/data

backup:
  enabled: true   # pre-upgrade hook backs up metrics.db before every deploy

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "250m"
