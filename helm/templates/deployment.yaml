apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-platform.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ai-platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ai-platform.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "ai-platform.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: {{ .Values.service.port | quote }}
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      {{- if .Values.initIngest.enabled }}
      initContainers:
        - name: ingest
          image: {{ .Values.image.registry }}/{{ include "ai-platform.name" . }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "ingest.py"]
          env:
            - name: OLLAMA_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-platform.name" . }}-secret
                  key: OLLAMA_HOST
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
      {{- end }}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "ai-platform.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname

      containers:
        - name: {{ include "ai-platform.name" . }}
          image: {{ .Values.image.registry }}/{{ include "ai-platform.name" . }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.port }}
          env:
            - name: OLLAMA_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-platform.name" . }}-secret
                  key: OLLAMA_HOST
            {{- if .Values.persistence.enabled }}
            - name: DB_PATH
              value: {{ .Values.persistence.mountPath }}/metrics.db
            {{- end }}
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "ai-platform.name" . }}-data
      {{- end }}
