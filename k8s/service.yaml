apiVersion: v1
kind: Service
metadata:
  name: devops-ai-assistant
  namespace: ai-platform
  labels:
    app.kubernetes.io/name: devops-ai-assistant
spec:
  # ClusterIP = internal only, Ingress handles all external traffic
  type: ClusterIP
  selector:
    app.kubernetes.io/name: devops-ai-assistant
  ports:
    - name: http        # named port — Ingress references this by name
      protocol: TCP
      port: 80
      targetPort: 8000
